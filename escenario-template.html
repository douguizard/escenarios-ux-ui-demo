<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Naowee Escenarios – Template</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/design-system.css"/>
<link rel="stylesheet" href="shared/shell.css"/>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <button class="burger-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')" aria-label="Toggle sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#282834" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <svg class="naowee-logo" viewBox="0 0 180 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="24" font-family="Inter" font-weight="800" font-size="22" fill="#002B5B">Naowee</text>
      </svg>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">ESCENARIOS</div>

      <div class="nav-row active" onclick="window.location.href='index.html'">
        <div class="active-bar"></div>
        <div class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="#d74009" stroke-width="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="#d74009" stroke-width="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="#d74009" stroke-width="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="#d74009" stroke-width="1.5"/>
          </svg>
        </div>
        <span class="lbl">Escenarios</span>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="nav-row" id="btnLogout">
        <div class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="#B5B9D4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <span class="lbl">Cerrar sesión</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="top-header">
      <div class="user-chip">
        <div class="ava">
          <div class="ava-ring" style="background:#c4b5fd;color:#4c1d95">DV</div>
          <div class="ava-dot"></div>
        </div>
        <div class="user-info">
          <span class="user-name">Doug Vargas</span>
          <span class="user-role">UX Designer</span>
        </div>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="#282834" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
    </header>

    <div class="page">
      <h1 class="page-title">Título del escenario</h1>
      <p class="page-sub">Breve descripción del flujo que muestra este escenario.</p>

      <!-- ═══ Aquí va el contenido del escenario ═══ -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px;text-align:center;color:var(--text-secondary)">
        Contenido del escenario
      </div>

    </div>
  </div>

</div>

<script>
function fadeAndGo(url){document.body.style.transition='opacity .25s ease';document.body.style.opacity='0';setTimeout(()=>{window.location.href=url},260)}
document.getElementById('btnLogout')?.addEventListener('click', () => {
  fadeAndGo('escenario-01-login.html');
});
</script>
</body>
</html>
